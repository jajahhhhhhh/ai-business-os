name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      # apps/api imports the orchestrator + collectors packages lazily (M3/M4);
      # exposing their sources is cheaper than cross-package installs in CI.
      PYTHONPATH: ${{ github.workspace }}/services/orchestrator/src:${{ github.workspace }}/services/collectors/src
    strategy:
      matrix:
        package: [apps/api, services/orchestrator, services/collectors]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: osuser
          POSTGRES_PASSWORD: ospass
          POSTGRES_DB: aibos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U osuser"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Lint
        working-directory: ${{ matrix.package }}
        run: |
          uv run --group dev ruff check src tests
          uv run --group dev ruff format --check src tests
      - name: Unit tests
        working-directory: ${{ matrix.package }}
        run: uv run --group dev pytest tests -q -m "not integration"
      - name: Integration tests
        if: matrix.package == 'apps/api'
        working-directory: ${{ matrix.package }}
        env:
          DATABASE_URL: postgresql+asyncpg://osuser:ospass@localhost:5432/aibos_test
        run: uv run --group dev pytest tests/integration -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/web }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci || npm install
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  images:
    runs-on: ubuntu-latest
    needs: [python, web]
    if: github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write }
    strategy:
      matrix:
        include:
          - { context: ., dockerfile: apps/api/Dockerfile, image: aibos-api }
          - { context: apps/web, dockerfile: apps/web/Dockerfile, image: aibos-web }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
